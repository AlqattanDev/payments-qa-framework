<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="'IBM Plex Sans','Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#12160f"/>
      <stop offset="1" stop-color="#1a2417"/>
    </linearGradient>
    <linearGradient id="grn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2aa85e"/>
      <stop offset="1" stop-color="#36c46f"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="0" y="0" width="1600" height="6" fill="url(#grn)"/>

  <!-- kicker + title -->
  <text x="90" y="150" fill="#8b9a86" font-size="30" letter-spacing="6">QA · TEST AUTOMATION</text>
  <text x="88" y="250" fill="#f0f1ea" font-size="88" font-weight="700">Payments QA Framework</text>
  <text x="90" y="312" fill="#b6c0b0" font-size="34">Watch an automated test drive a live payments app — verified to the ledger.</text>

  <!-- left: app card -->
  <g transform="translate(90,380)">
    <rect width="640" height="430" rx="18" fill="#0d1117" stroke="#26302a" stroke-width="1.5"/>
    <circle cx="34" cy="40" r="7" fill="#36c46f"/>
    <text x="58" y="48" fill="#e6edf3" font-size="26" font-weight="700">Ledgerline · Alice</text>
    <g transform="translate(30,86)" font-size="23">
      <rect width="580" height="52" rx="9" fill="#161d17"/><text x="20" y="33" fill="#c7d0c3">ACC-1001 · Checking</text><text x="560" y="33" fill="#36c46f" text-anchor="end" font-weight="700">$4,900.00</text>
      <rect y="64" width="580" height="52" rx="9" fill="#161d17"/><text x="20" y="97" fill="#c7d0c3">ACC-2001 · Bob Checking</text><text x="560" y="97" fill="#c7d0c3" text-anchor="end" font-weight="700">$400.00</text>
    </g>
    <g transform="translate(30,230)">
      <rect width="580" height="60" rx="10" fill="#111814" stroke="#243021"/>
      <text x="22" y="38" fill="#7f8c7b" font-size="22">Amount</text><text x="200" y="38" fill="#e6edf3" font-size="22">100.00</text>
      <rect x="430" y="10" width="140" height="40" rx="8" fill="url(#grn)"/><text x="500" y="37" fill="#05130b" font-size="21" font-weight="700" text-anchor="middle">Send</text>
    </g>
    <text x="30" y="340" fill="#36c46f" font-size="23" font-weight="600">✓ Payment sent · Invoice 4471</text>
    <!-- robot cursor -->
    <path transform="translate(548,268)" d="M0 0l16 42 7-17 17-7L0 0z" fill="#f0f1ea" stroke="#0d1117" stroke-width="2"/>
  </g>

  <!-- right: passing spec -->
  <g transform="translate(800,380)">
    <rect width="710" height="430" rx="18" fill="#111814" stroke="#26302a" stroke-width="1.5"/>
    <text x="34" y="52" fill="#7f8c7b" font-size="22" font-family="'Source Code Pro',monospace">payment_transfer.feature</text>
    <g font-size="26" transform="translate(34,96)">
      <g transform="translate(0,0)"><circle cx="14" cy="14" r="15" fill="#36c46f"/><path d="M7 14l5 5 9-10" stroke="#05130b" stroke-width="3" fill="none"/><text x="46" y="22" fill="#e6edf3"><tspan fill="#7fd6a0" font-weight="700">Given </tspan>I am signed in as Alice</text></g>
      <g transform="translate(0,52)"><circle cx="14" cy="14" r="15" fill="#36c46f"/><path d="M7 14l5 5 9-10" stroke="#05130b" stroke-width="3" fill="none"/><text x="46" y="22" fill="#e6edf3"><tspan fill="#7fd6a0" font-weight="700">When </tspan>I send 100.00 USD</text></g>
      <g transform="translate(0,104)"><circle cx="14" cy="14" r="15" fill="#36c46f"/><path d="M7 14l5 5 9-10" stroke="#05130b" stroke-width="3" fill="none"/><text x="46" y="22" fill="#e6edf3"><tspan fill="#7fd6a0" font-weight="700">Then </tspan>the payment is accepted</text></g>
      <g transform="translate(0,156)"><circle cx="14" cy="14" r="15" fill="#36c46f"/><path d="M7 14l5 5 9-10" stroke="#05130b" stroke-width="3" fill="none"/><text x="46" y="22" fill="#e6edf3"><tspan fill="#7fd6a0" font-weight="700">And </tspan>ledger ACC-1001 = 4900.00</text></g>
      <g transform="translate(0,208)"><circle cx="14" cy="14" r="15" fill="#36c46f"/><path d="M7 14l5 5 9-10" stroke="#05130b" stroke-width="3" fill="none"/><text x="46" y="22" fill="#e6edf3"><tspan fill="#7fd6a0" font-weight="700">And </tspan>total unchanged</text></g>
    </g>
    <text x="34" y="392" fill="#36c46f" font-size="27" font-weight="700">✓ 15 scenarios · 64 steps · passed</text>
  </g>

  <!-- tool chips -->
  <g transform="translate(90,838)" font-size="24" fill="#9aa694">
    <text x="0" y="0">Playwright · Cucumber BDD · Cypress · Selenium · CI green</text>
  </g>
</svg>
